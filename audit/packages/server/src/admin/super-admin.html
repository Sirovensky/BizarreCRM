<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizarreCRM — Super Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Login */
  .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 400px; max-width: 90vw; }
  .login-box h1 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #f1f5f9; }
  .login-box .subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 32px; }
  .login-box .shield { text-align: center; font-size: 48px; margin-bottom: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none; }
  .form-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: #6366f1; color: white; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-sm { padding: 6px 12px; width: auto; font-size: 12px; border-radius: 6px; }
  .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
  .btn-outline:hover { border-color: #6366f1; color: #6366f1; }
  .error { color: #f87171; font-size: 13px; margin-top: 12px; text-align: center; }
  .info { color: #60a5fa; font-size: 13px; margin-top: 12px; text-align: center; }
  .qr-container { text-align: center; margin: 16px 0; }
  .qr-container img { border-radius: 12px; border: 2px solid #334155; }
  .secret-code { background: #0f172a; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 12px; word-break: break-all; color: #a5b4fc; text-align: center; margin: 8px 0; }

  /* Dashboard */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #1e293b; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #94a3b8; }
  .tabs { display: flex; gap: 4px; background: #1e293b; border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #94a3b8; cursor: pointer; border: none; background: none; transition: all .15s; }
  .tab.active { background: #6366f1; color: white; }
  .tab:hover:not(.active) { color: #e2e8f0; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
  .kpi .value { font-size: 28px; font-weight: 700; color: #f1f5f9; }
  .kpi .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 13px; }
  th { color: #64748b; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #065f46; color: #6ee7b7; }
  .badge-red { background: #7f1d1d; color: #fca5a5; }
  .badge-amber { background: #78350f; color: #fcd34d; }
  .badge-gray { background: #374151; color: #9ca3af; }
  .actions { display: flex; gap: 6px; }
  .hidden { display: none; }
  .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .dialog { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; width: 450px; max-width: 90vw; }
  .dialog h3 { margin-bottom: 16px; }
</style>
</head>
<body>

<div id="app"></div>

<script src="/admin/js/super-admin.js"></script>
</body>
</html>
