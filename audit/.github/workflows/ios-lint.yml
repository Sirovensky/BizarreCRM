  #       run: |
  #         xcodebuild \
  #           -scheme BizarreCRM \
  #           -destination 'generic/platform=iOS Simulator' \
  #           build-for-testing \
  #           CODE_SIGN_IDENTITY="" \
  #           CODE_SIGNING_REQUIRED=NO \
  #           ONLY_ACTIVE_ARCH=YES \
  #         | xcpretty || xcodebuild \
  #           -scheme BizarreCRM \
  #           -destination 'generic/platform=iOS Simulator' \
  #           build-for-testing \
  #           CODE_SIGN_IDENTITY="" \
  #           CODE_SIGNING_REQUIRED=NO \
