name: iOS Lint

# Phase 0 gate — §20 / §28.3 / §32 data-sovereignty checks.
# Runs on every PR and every push to main when ios/** changes.
#
# Steps:
#   1. sdk-ban.sh — blocks forbidden SDKs, bare URLSession, APIClient leaks.
#   2. (optional) xcodebuild build-for-testing — validates the scheme compiles.
#      Requires a macOS runner; only wired when Xcode is available.
#
# See ios/agent-ownership.md Phase 0 gate and ios/ActionPlan.md §32.

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-lint.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-lint.yml'

permissions:
  contents: read

jobs:
  # ── Job 1: SDK-ban + containment lint ─────────────────────────────────────
  # Runs on ubuntu-latest (fast, cheap) because sdk-ban.sh is pure bash/grep.
  sdk-ban:
    name: SDK ban + containment lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run sdk-ban.sh
        run: bash ios/scripts/sdk-ban.sh

  # ── Job 2: Swift build-for-testing (macOS only) ───────────────────────────
  # Disabled until a self-hosted macOS runner is configured.
  # To enable: remove the `if: false` line and ensure the runner label below
  # matches an available macOS runner (e.g. macos-14 or self-hosted).
  #
  # xcodebuild-lint:
  #   name: xcodebuild build-for-testing
  #   if: false  # enable when macOS runner available
  #   runs-on: macos-14
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Generate Xcode project
  #       run: bash ios/scripts/gen.sh
  #
