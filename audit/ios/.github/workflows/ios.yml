name: iOS

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"

defaults:
  run:
    working-directory: ios

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/Packages/**/Package.swift') }}

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM
        run: xcodebuild -resolvePackageDependencies -project BizarreCRM.xcodeproj

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project BizarreCRM.xcodeproj \
            -scheme BizarreCRM \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Test (Core package only — others need full app target)
        run: |
          set -o pipefail
          swift test --package-path Packages/Core
          swift test --package-path Packages/DesignSystem
          swift test --package-path Packages/Networking | true
