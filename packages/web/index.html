<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEC-H61: no-referrer at the HTML level so a reset-password URL like
         /reset-password/<token> never leaks to third-party origins (fonts,
         analytics, image hosts, external links) via the Referer header. This
         is a client-side belt to the server's strict-origin-when-cross-origin
         Referrer-Policy header — the stricter of the two wins. -->
    <meta name="referrer" content="no-referrer" />
    <!-- WEB-FE-001: Security headers as <meta> tags so static-host fallbacks
         (Vite preview, raw S3, file://) still get a baseline policy when no
         server-side `helmet` middleware is in front of the bundle. The prod
         server already sends a stricter CSP via response headers; the meta
         CSP below stays compatible with that one (it only intersects, never
         loosens, server policy). 'unsafe-inline' on style-src is required by
         Tailwind dev and Google Fonts CSS; 'unsafe-eval' is intentionally
         omitted — Vite's prod bundle does not need it. hCaptcha (signup
         only — see WEB-FA-010) needs https://hcaptcha.com + js.hcaptcha.com
         on script-src and frame-src. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.hcaptcha.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: https: https://*.hcaptcha.com; frame-src https://*.hcaptcha.com https://newassets.hcaptcha.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="format-detection" content="telephone=no" />
    <title>BizarreCRM</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FBF3DB" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // D4-8: apply dark class synchronously BEFORE the React render cycle so
      // users on dark theme never see a bright-white flash on cold boot.
      // Matches uiStore.ts which writes the flat 'theme' localStorage key
      // (NOT a Zustand persist 'ui-storage' shape — that was a stale mismatch
      // causing every user with theme=dark stored to still flash white on
      // cold load before React mounted and re-resolved).
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'system';
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = theme === 'dark' || (theme === 'system' && prefersDark);
          if (isDark) {
            document.documentElement.classList.add('dark');
            // Also paint the body background via inline style so the first
            // frame before Tailwind's dark:bg-surface-950 CSS applies is
            // already dark. This is the gap that kept the cold-boot flash
            // visible even with the dark class on <html>.
            document.documentElement.style.backgroundColor = '#0a0a0a';
          }
        } catch (_) { /* storage disabled — fall through to light */ }
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-surface-950 text-surface-900 dark:text-surface-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Unregister any previously installed service worker (was caching 500 errors)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        // Clear all caches left behind by the old SW
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      }
    </script>
  </body>
</html>
