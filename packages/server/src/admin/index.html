<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bizarre CRM - Server Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:2rem}
h1{font-size:1.5rem;margin-bottom:.25rem}
h2{font-size:1rem;color:#94a3b8;margin-bottom:1rem;font-weight:500}
h3{font-size:.875rem;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:.75rem}
.container{max-width:900px;margin:0 auto}
.card{background:#1e293b;border-radius:.75rem;padding:1.25rem;margin-bottom:1rem;border:1px solid #334155}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.stat{text-align:center;padding:.75rem}
.stat-val{font-size:1.5rem;font-weight:700;color:#38bdf8}
.stat-label{font-size:.75rem;color:#94a3b8;margin-top:.25rem}
label{display:block;font-size:.75rem;font-weight:600;color:#94a3b8;margin-bottom:.25rem}
input,select{width:100%;padding:.5rem .75rem;background:#0f172a;border:1px solid #334155;border-radius:.5rem;color:#e2e8f0;font-size:.875rem;outline:none}
input:focus,select:focus{border-color:#38bdf8}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:.5rem;font-size:.875rem;font-weight:600;border:none;cursor:pointer;transition:background .15s}
.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}
.btn-success{background:#22c55e;color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#334155}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.flex-1{flex:1}
.badge{display:inline-block;padding:.125rem .5rem;border-radius:1rem;font-size:.75rem;font-weight:600}
.badge-ok{background:#166534;color:#4ade80}
.badge-err{background:#7f1d1d;color:#fca5a5}
.backup-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #1e293b}
.backup-item:last-child{border:none}
.folder-list{max-height:200px;overflow-y:auto;border:1px solid #334155;border-radius:.5rem;margin-top:.5rem}
.folder-item{padding:.375rem .75rem;cursor:pointer;font-size:.875rem;display:flex;align-items:center;gap:.5rem}
.folder-item:hover{background:#334155}
.folder-item.active{background:#0ea5e9;color:#fff}
.text-sm{font-size:.875rem}.text-xs{font-size:.75rem}.text-muted{color:#64748b}
.mt-1{margin-top:.5rem}.mb-1{margin-bottom:.5rem}
#status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;margin-right:.5rem}
</style>
</head>
<body>
<!-- Login Screen -->
<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
  <div class="card" style="width:360px;text-align:center">
    <h1 style="margin-bottom:.25rem">Bizarre CRM</h1>
    <p class="text-sm text-muted" style="margin-bottom:1.5rem">Server Admin Login</p>
    <div style="text-align:left">
      <label>Username</label>
      <input id="login-user" type="text" placeholder="Admin Username" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()" style="margin-bottom:.75rem">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
      <div id="login-error" style="color:#f87171;font-size:.75rem;min-height:1.25rem;margin-top:.5rem"></div>
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;margin-top:.5rem;justify-content:center">Sign In</button>
    </div>
  </div>
</div>

<!-- Main Screen -->
<div id="main-screen" style="display:none">
<div id="dev-banner" style="display:none;background:#dc2626;color:white;text-align:center;padding:6px;font-size:12px;font-weight:700;letter-spacing:0.05em">
  ⚠ DEVELOPMENT MODE — NOT SECURE FOR PRODUCTION
</div>
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <div>
      <h1><span id="status-dot"></span>Bizarre CRM Server</h1>
      <h2>Admin Panel</h2>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <div class="text-xs text-muted" id="info"></div>
      <button class="btn btn-ghost text-xs" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Status cards -->
  <div class="grid2">
    <div class="card">
      <div class="grid2">
        <div class="stat"><div class="stat-val" id="db-size">—</div><div class="stat-label">Database Size</div></div>
        <div class="stat"><div class="stat-val" id="uploads-size">—</div><div class="stat-label">Uploads Size</div></div>
      </div>
    </div>
    <div class="card">
      <div class="grid2">
        <div class="stat"><div class="stat-val" id="uptime">—</div><div class="stat-label">Uptime</div></div>
        <div class="stat"><div class="stat-val" id="last-backup">—</div><div class="stat-label">Last Backup</div></div>
      </div>
    </div>
  </div>

  <!-- Backup Settings -->
  <div class="card">
    <h3>Backup Settings</h3>
    <div class="row">
      <div class="flex-1">
        <label>Backup Folder</label>
        <div style="display:flex;gap:.5rem">
          <input id="backup-path" placeholder="Browse or type path (e.g. Y:\Backups or \\server\share)">
          <button class="btn btn-ghost" onclick="toggleBrowser()">Browse</button>
        </div>
      </div>
    </div>
    <!-- Folder browser -->
    <div id="browser" style="display:none" class="mb-1">
      <div class="row">
        <label>Drives:</label>
        <div id="drives" style="display:flex;gap:.25rem;flex-wrap:wrap"></div>
      </div>
      <div class="row"><button class="btn btn-ghost text-sm" onclick="browseUp()">.. Parent</button> <span class="text-sm text-muted" id="browse-path"></span></div>
      <div class="folder-list" id="folders"></div>
      <div class="mt-1" style="display:flex;gap:.5rem">
        <button class="btn btn-primary text-sm" onclick="selectFolder()">Use This Folder</button>
        <button class="btn btn-ghost text-sm" onclick="newFolder()">+ New Folder</button>
      </div>
    </div>
    <div class="grid2">
      <div>
        <label>Schedule (cron)</label>
        <select id="backup-schedule">
          <option value="0 3 * * *">Daily at 3:00 AM</option>
          <option value="0 0 * * *">Daily at Midnight</option>
          <option value="0 */6 * * *">Every 6 Hours</option>
          <option value="0 */12 * * *">Every 12 Hours</option>
          <option value="0 3 * * 0">Weekly (Sunday 3 AM)</option>
        </select>
      </div>
      <div>
        <label>Keep Last N Backups</label>
        <input id="backup-retention" type="number" min="1" max="365" value="30">
      </div>
    </div>
    <div class="row mt-1">
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      <button class="btn btn-success" id="btn-backup" onclick="backupNow()">Backup Now</button>
    </div>
  </div>

  <!-- Backups List -->
  <div class="card">
    <h3>Recent Backups</h3>
    <div id="backups"><span class="text-muted text-sm">Loading...</span></div>
  </div>
</div>
</div><!-- /main-screen -->

<script>
const API = '/api/v1/admin';
let currentBrowsePath = '';
let authToken = sessionStorage.getItem('admin_token') || '';

// XSS protection — escape HTML entities in dynamic values
function esc(str) { if (str == null) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmt(bytes) { if (!bytes) return '0 B'; const u = ['B','KB','MB','GB']; let i = 0; let b = bytes; while (b >= 1024 && i < 3) { b /= 1024; i++; } return b.toFixed(i > 0 ? 1 : 0) + ' ' + u[i]; }
function fmtTime(s) { if (s < 60) return s + 's'; if (s < 3600) return Math.floor(s/60) + 'm'; const h = Math.floor(s/3600); return h + 'h ' + Math.floor((s%3600)/60) + 'm'; }
function fmtDate(iso) { if (!iso) return 'Never'; return new Date(iso).toLocaleString(); }

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Admin-Token': authToken } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (r.status === 401) { showLogin(); return { success: false }; }
  return r.json();
}

function showLogin() {
  authToken = '';
  sessionStorage.removeItem('admin_token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
}

function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  load();
}

async function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!user || !pass) { err.textContent = 'Enter username and password'; return; }
  try {
    const r = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass }),
    });
    const data = await r.json();
    if (!data.success) { err.textContent = data.message || 'Login failed'; return; }
    authToken = data.data.token;
    sessionStorage.setItem('admin_token', authToken);
    showMain();
  } catch { err.textContent = 'Connection error'; }
}

async function doLogout() {
  await api('POST', '/logout');
  showLogin();
}

async function load() {
  const { data } = await api('GET', '/status');
  document.getElementById('db-size').textContent = fmt(data.dbSize);
  document.getElementById('uploads-size').textContent = fmt(data.uploadsSize);
  document.getElementById('uptime').textContent = fmtTime(data.uptime);
  document.getElementById('last-backup').textContent = data.backup.lastBackup ? fmtDate(data.backup.lastBackup) : 'Never';
  document.getElementById('info').textContent = `${esc(data.hostname)} | Port ${esc(data.port)} | ${esc(data.platform)} | Node ${esc(data.nodeVersion)}`;
  // Show dev mode banner if not production
  if (data.nodeEnv !== 'production') {
    document.getElementById('dev-banner').style.display = 'block';
  }
  document.getElementById('backup-path').value = data.backup.path || '';
  document.getElementById('backup-schedule').value = data.backup.schedule || '0 3 * * *';
  document.getElementById('backup-retention').value = data.backup.retention || 30;
  loadBackups();
}

async function loadBackups() {
  const { data } = await api('GET', '/backups');
  const el = document.getElementById('backups');
  if (!data || data.length === 0) { el.innerHTML = '<span class="text-muted text-sm">No backups yet</span>'; return; }
  el.innerHTML = data.map(b => `<div class="backup-item">
    <div><span class="text-sm">${esc(b.name)}</span><br><span class="text-xs text-muted">${esc(fmt(b.size))} &middot; ${esc(fmtDate(b.date))}</span></div>
    <button class="btn btn-danger text-xs" onclick="delBackup('${esc(b.name).replace(/'/g,'\\&#39;')}')">Delete</button>
  </div>`).join('');
}

async function saveSettings() {
  await api('PUT', '/backup-settings', {
    path: document.getElementById('backup-path').value,
    schedule: document.getElementById('backup-schedule').value,
    retention: parseInt(document.getElementById('backup-retention').value) || 30,
  });
  alert('Settings saved');
  load();
}

async function backupNow() {
  const btn = document.getElementById('btn-backup');
  btn.disabled = true; btn.textContent = 'Backing up...';
  const { data } = await api('POST', '/backup');
  btn.disabled = false; btn.textContent = 'Backup Now';
  alert(data.success ? 'Backup completed!' : 'Backup failed: ' + data.message);
  load();
}

async function delBackup(name) {
  if (!confirm('Delete ' + name + '?')) return;
  await api('DELETE', '/backups/' + encodeURIComponent(name));
  loadBackups();
}

// Folder browser
async function toggleBrowser() {
  const el = document.getElementById('browser');
  if (el.style.display === 'none') { el.style.display = 'block'; loadDrives(); }
  else el.style.display = 'none';
}

async function loadDrives() {
  const { data } = await api('GET', '/drives');
  const drivesEl = document.getElementById('drives');
  drivesEl.innerHTML = data.map(d =>
    `<button class="btn btn-ghost text-xs" data-browse-path="${esc(d.path)}">${esc(d.label)} (${esc(fmt(d.free))} free)</button>`
  ).join('');
  drivesEl.querySelectorAll('[data-browse-path]').forEach(btn => {
    btn.addEventListener('click', () => browse(btn.getAttribute('data-browse-path')));
  });
}

async function browse(p) {
  currentBrowsePath = p;
  document.getElementById('browse-path').textContent = p;
  const { data } = await api('GET', '/drives/browse?path=' + encodeURIComponent(p));
  const foldersEl = document.getElementById('folders');
  if (!data.folders.length) {
    foldersEl.innerHTML = '<div class="text-sm text-muted" style="padding:.5rem">Empty folder</div>';
    return;
  }
  foldersEl.innerHTML = data.folders.map(f =>
    `<div class="folder-item" data-browse-path="${esc(f.path)}">📁 ${esc(f.name)}</div>`
  ).join('');
  foldersEl.querySelectorAll('[data-browse-path]').forEach(el => {
    el.addEventListener('dblclick', () => browse(el.getAttribute('data-browse-path')));
  });
}

function browseUp() {
  if (!currentBrowsePath) return;
  const parent = currentBrowsePath.replace(/[/\\][^/\\]+[/\\]?$/, '') || (process?.platform === 'win32' ? 'C:\\' : '/');
  browse(parent);
}

async function newFolder() {
  const name = prompt('New folder name:');
  if (!name || !name.trim()) return;
  await api('POST', '/drives/mkdir', { path: currentBrowsePath, name: name.trim() });
  browse(currentBrowsePath);
}

function selectFolder() {
  document.getElementById('backup-path').value = currentBrowsePath;
  document.getElementById('browser').style.display = 'none';
}

// Init: check if we have a valid token
async function init() {
  if (authToken) {
    const r = await api('GET', '/status');
    if (r.success) { showMain(); return; }
  }
  showLogin();
}
init();
</script>
</body>
</html>
