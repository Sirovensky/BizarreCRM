area: catalog
status: reference-only
source:
  server_routes:
    - packages/server/src/routes/catalog.routes.ts
    - packages/server/src/routes/deviceTemplates.routes.ts
    - packages/server/src/routes/repairPricing.routes.ts
  web_client: packages/web/src/api/endpoints.ts
  android:
    api:
      - android/app/src/main/java/com/bizarreelectronics/crm/data/remote/api/CatalogApi.kt
      - android/app/src/main/java/com/bizarreelectronics/crm/data/remote/api/RepairPricingApi.kt
auth: bearer
endpoints:
  - method: GET
    path: /api/v1/catalog/manufacturers
    purpose: List device manufacturers.
  - method: GET
    path: /api/v1/catalog/devices
    purpose: Search device models.
    query:
      q: string optional
      manufacturer_id: number optional
      category: string optional
      popular: boolean optional
      limit: number optional
  - method: GET
    path: /api/v1/catalog/devices/{id}
    purpose: Get device model detail.
  - method: GET
    path: /api/v1/catalog/search
    purpose: Search supplier catalog.
  - method: GET
    path: /api/v1/catalog/parts-search
    purpose: Unified parts search across local inventory and supplier catalog.
    query:
      q: string
      device_model_id: number optional
      source: string optional
      live: boolean optional
  - method: POST
    path: /api/v1/catalog/import/{catalogId}
    purpose: Import supplier catalog item into inventory.
    request:
      markup_pct: number optional
      in_stock_qty: number optional
  - method: POST
    path: /api/v1/catalog/sync
    purpose: Start supplier catalog sync job.
    request:
      source: mobilesentrix|phonelcdparts|string
  - method: GET
    path: /api/v1/catalog/jobs
    purpose: List catalog sync jobs.
  - method: POST
    path: /api/v1/catalog/order-queue/add
    purpose: Add part/item to supplier order queue.
    request:
      name: string
      source: string optional
      catalog_item_id: number optional
      inventory_item_id: number optional
      quantity_needed: number optional
      ticket_id: number optional
  - method: GET
    path: /api/v1/device-templates
    purpose: List device templates.
  - method: GET
    path: /api/v1/repair-pricing/services
    purpose: List repair pricing services.
  - method: GET
    path: /api/v1/repair-pricing/prices
    purpose: List repair prices.
  - method: GET
    path: /api/v1/repair-pricing/lookup
    purpose: Lookup repair price by device model/service.
    query:
      device_model_id: number
      repair_service_id: number
  - method: GET
    path: /api/v1/repair-pricing/tiers
    purpose: Return server-owned dynamic pricing tier thresholds plus device counts.
    response:
      data:
        thresholds:
          tierAYears: number
          tierBYears: number
        tiers: RepairPricingTierDescriptor[]
  - method: PUT
    path: /api/v1/repair-pricing/tiers
    purpose: Update dynamic pricing age-tier thresholds. Manager/admin only.
    request:
      tier_a_years: number
      tier_b_years: number
  - method: GET
    path: /api/v1/repair-pricing/matrix
    purpose: Return the authoritative device/service pricing matrix with tier, custom, supplier-cost, and profit metadata.
    query:
      category: string optional
      manufacturer_id: number optional
      repair_service_id: number optional
      q: string optional
      limit: number optional
  - method: POST
    path: /api/v1/repair-pricing/seed-defaults
    purpose: Seed day-1 tier labor defaults into the server-owned repair_prices matrix. Manager/admin only.
    request:
      category: string optional
      pricing: object optional
      overwrite_custom: boolean optional
  - method: POST
    path: /api/v1/repair-pricing/tier-apply
    purpose: Apply one tier labor default across matching device models, preserving custom cells unless overwrite_custom is true. Manager/admin only.
    request:
      repair_service_id: number
      tier: tier_a|tier_b|tier_c
      labor_price: number
      category: string optional
      overwrite_custom: boolean optional
  - method: GET
    path: /api/v1/repair-pricing/audit
    purpose: List server audit history for pricing changes.
    query:
      repair_price_id: number optional
      device_model_id: number optional
      repair_service_id: number optional
      from: ISO-8601 string optional
      to: ISO-8601 string optional
      limit: number optional
  - method: POST
    path: /api/v1/repair-pricing/revert/{priceId}
    purpose: Revert a custom price to its stored tier default, peer tier average, or current value if no default exists. Manager/admin only.
  - method: GET
    path: /api/v1/repair-pricing/auto-margin-settings
    purpose: Return the server-owned auto-margin calculator policy.
  - method: PUT
    path: /api/v1/repair-pricing/auto-margin-settings
    purpose: Update traffic preset, percent or fixed-dollar targets, rounding mode, per-run safety cap, and optional service/tier/device rules. Manager/admin only.
    request:
      preset: high_traffic|mid_traffic|low_traffic|custom optional
      target_type: percent|fixed_amount optional
      target_margin_pct: number optional
      target_profit_amount: number optional
      calculation_basis: gross_margin|markup optional
      rounding_mode: none|ending_99|whole_dollar|ending_98 optional
      cap_pct: number optional
      rules: auto-margin rule[] optional
  - method: POST
    path: /api/v1/repair-pricing/auto-margin-preview
    purpose: Preview the server calculator without writing repair_prices.
    request:
      supplier_cost: number
      current_labor_price: number optional
      target_type: percent|fixed_amount optional
      target_margin_pct: number optional
      target_profit_amount: number optional
      calculation_basis: gross_margin|markup optional
      rounding_mode: none|ending_99|whole_dollar|ending_98 optional
      cap_pct: number optional
      rule: auto-margin rule optional
  - method: POST
    path: /api/v1/repair-pricing/recompute-profits
    purpose: Refresh supplier-cost/profit metadata from the server supplier catalog and optionally run auto-margin adjustments. Manager/admin only.
    request:
      price_ids: number[] optional
      auto_margin: boolean optional
