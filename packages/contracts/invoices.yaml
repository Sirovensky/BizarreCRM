area: invoices
status: reference-only
source:
  server_routes:
    - packages/server/src/routes/invoices.routes.ts
  web_client: packages/web/src/api/endpoints.ts
  android:
    api: packages/android/app/src/main/java/com/bizarreelectronics/crm/data/remote/api/InvoiceApi.kt
    dto: packages/android/app/src/main/java/com/bizarreelectronics/crm/data/remote/dto/InvoiceDto.kt
auth: bearer
list_query:
  page: number optional
  pagesize: number optional
  status: string optional
  from_date: string optional
  to_date: string optional
  keyword: string optional
  customer_id: number optional
endpoints:
  - method: GET
    path: /api/v1/invoices
    purpose: List invoices.
    response_data:
      invoices: Invoice[]
      pagination: Pagination
  - method: GET
    path: /api/v1/invoices/stats
    purpose: Invoice dashboard stats.
  - method: GET
    path: /api/v1/invoices/{id}
    purpose: Fetch invoice detail with line items/payments.
    response_data:
      invoice: InvoiceDetail
  - method: POST
    path: /api/v1/invoices
    purpose: Create invoice.
    idempotency: recommended
    request:
      customer_id: number
      ticket_id: number optional
      items: InvoiceLineInput[]
      discount: number optional
      tax: number optional
      notes: string optional
  - method: PUT
    path: /api/v1/invoices/{id}
    purpose: Update invoice.
    request: InvoiceUpdate
  - method: POST
    path: /api/v1/invoices/{id}/payments
    purpose: Record payment against invoice.
    idempotency: required
    request:
      amount: number
      method: string
      reference: string optional
      notes: string optional
  - method: POST
    path: /api/v1/invoices/{id}/void
    purpose: Void invoice and reverse inventory/payment state according to server rules.
  - method: POST
    path: /api/v1/invoices/{id}/credit-note
    purpose: Create credit note for invoice.
    request:
      amount: number
      reason: string
  - method: POST
    path: /api/v1/invoices/bulk-action
    purpose: Apply bulk action to invoices.
    request:
      action: string
      invoice_ids: number[]
