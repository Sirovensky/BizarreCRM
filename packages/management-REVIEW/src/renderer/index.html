<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    @audit-fixed: tightened the CSP and removed all external network access.
    The previous CSP allowed style-src/font-src/img-src to https://fonts.googleapis.com
    + https://fonts.gstatic.com so the renderer could load Google Fonts at
    runtime. That violated the dashboard's "renderer talks to the local CRM
    over IPC, nothing else" trust model — every dashboard cold-start phoned
    home to Google with the user's IP and User-Agent. The font preconnect /
    stylesheet links were removed in the same pass; the dashboard now falls
    back to the system UI font stack defined in the Tailwind theme. The CSP
    also drops the spurious `connect-src ws://localhost:*` rule (the
    renderer no longer opens a WebSocket of its own — all comms go through
    the preload IPC bridge to the main process). `default-src 'none'`
    enforces deny-by-default; only the explicitly listed sources are
    allowed, and `frame-ancestors 'none'` blocks any clickjacking attempt
    by a hypothetical attacker who manages to load the renderer in a
    cross-origin iframe.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; img-src 'self' data: blob:; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" />
  <title>BizarreCRM Server Dashboard</title>
</head>
<body class="bg-surface-950 text-surface-100 antialiased">
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
