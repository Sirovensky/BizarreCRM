name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.11'
          cache: 'npm'

      # --ignore-scripts prevents malicious lifecycle scripts (SEC-H111)
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web
        run: cd packages/web && npm run build

      - name: Type-check server
        run: cd packages/server && npx tsc --noEmit

      - name: Type-check management
        run: cd packages/management && npx tsc --noEmit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Fail on high or critical vulnerabilities
      - name: Audit root
        run: npm audit --audit-level=high

      - name: Audit packages/server
        run: npm audit --audit-level=high --prefix packages/server

      - name: Audit packages/web
        run: npm audit --audit-level=high --prefix packages/web

      - name: Audit packages/management
        run: npm audit --audit-level=high --prefix packages/management

  supply-chain:
    name: Supply-chain Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Fails if any package in the tree is missing or unresolvable
      - name: Verify dependency tree (root)
        run: npm ls --all > /dev/null

      - name: Verify dependency tree (server)
        run: npm ls --all --prefix packages/server > /dev/null

      - name: Verify dependency tree (web)
        run: npm ls --all --prefix packages/web > /dev/null

      - name: Verify dependency tree (management)
        run: npm ls --all --prefix packages/management > /dev/null
