name: BizarreCRM
options:
  bundleIdPrefix: com.bizarrecrm
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configs/Debug.xcconfig
  Release: Configs/Release.xcconfig

packages:
  Core:          { path: Packages/Core }
  DesignSystem:  { path: Packages/DesignSystem }
  Networking:    { path: Packages/Networking }
  Persistence:   { path: Packages/Persistence }
  Auth:          { path: Packages/Auth }
  Sync:          { path: Packages/Sync }
  Hardware:      { path: Packages/Hardware }
  Dashboard:     { path: Packages/Dashboard }
  Tickets:       { path: Packages/Tickets }
  Customers:     { path: Packages/Customers }
  Inventory:     { path: Packages/Inventory }
  Invoices:      { path: Packages/Invoices }
  Estimates:     { path: Packages/Estimates }
  Leads:         { path: Packages/Leads }
  Appointments:  { path: Packages/Appointments }
  Expenses:      { path: Packages/Expenses }
  Pos:           { path: Packages/Pos }
  Communications: { path: Packages/Communications }
  Reports:       { path: Packages/Reports }
  Settings:      { path: Packages/Settings }
  Notifications: { path: Packages/Notifications }
  Employees:     { path: Packages/Employees }
  Camera:        { path: Packages/Camera }
  Search:        { path: Packages/Search }

targets:
  BizarreCRM:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: App/Resources
        excludes:
          # Info.plist is regenerated below; exclude to avoid duplicate copy.
          - Info.plist
          # Entitlements isn't a bundle resource.
          - BizarreCRM.entitlements
      - path: App/Assets.xcassets
    # Generated on every `xcodegen generate` from the properties below so
    # Xcode's capability editor can't clobber it. The file is gitignored.
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: "Bizarre CRM"
        LSRequiresIPhoneOS: true
        MinimumOSVersion: "17.0"
        UIDeviceFamily:
          - 1
          - 2
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneClassName: UIWindowScene
                UISceneDelegateClassName: ""
        UIBackgroundModes:
          - remote-notification
          - processing
          - fetch
        UILaunchScreen:
          UIImageRespectsSafeAreaInsets: true
          UIColorName: SurfaceBase
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Scan barcodes and take photos of devices under repair."
        NSPhotoLibraryUsageDescription: "Attach existing photos to repair tickets."
        NSPhotoLibraryAddUsageDescription: "Save ticket photos to your library."
        NSFaceIDUsageDescription: "Authenticate to unlock Bizarre CRM."
        NSBluetoothAlwaysUsageDescription: "Connect to Bluetooth receipt printers and card readers."
        NSContactsUsageDescription: "Import customer phone numbers from Contacts."
        NSLocalNetworkUsageDescription: "Discover your shop server and payment terminal on the local network."
        ITSAppUsesNonExemptEncryption: false
        NSUserActivityTypes:
          - com.bizarrecrm.ticket.view
          - com.bizarrecrm.ticket.create
        CFBundleURLTypes:
          - CFBundleURLName: com.bizarrecrm
            CFBundleURLSchemes:
              - bizarrecrm
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - BarlowCondensed-SemiBold.ttf
          - BarlowCondensed-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
        BZ_API_BASE_URL: "$(BZ_API_BASE_URL)"
        BZ_SPKI_PINS: "$(BZ_SPKI_PINS)"
    entitlements:
      path: App/Resources/BizarreCRM.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bizarrecrm
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Core
        product: Core
      - package: DesignSystem
        product: DesignSystem
      - package: Networking
        product: Networking
      - package: Persistence
        product: Persistence
      - package: Auth
        product: Auth
      - package: Sync
        product: Sync
      - package: Hardware
        product: Hardware
      - package: Dashboard
        product: Dashboard
      - package: Tickets
        product: Tickets
      - package: Customers
        product: Customers
      - package: Inventory
        product: Inventory
      - package: Invoices
        product: Invoices
      - package: Estimates
        product: Estimates
      - package: Leads
        product: Leads
      - package: Appointments
        product: Appointments
      - package: Expenses
        product: Expenses
      - package: Pos
        product: Pos
      - package: Communications
        product: Communications
      - package: Reports
        product: Reports
      - package: Settings
        product: Settings
      - package: Notifications
        product: Notifications
      - package: Employees
        product: Employees
      - package: Camera
        product: Camera
      - package: Search
        product: Search

  BizarreCRMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bizarrecrm.tests
    dependencies:
      - target: BizarreCRM

schemes:
  BizarreCRM:
    build:
      targets:
        BizarreCRM: all
    test:
      targets: [BizarreCRMTests]
    run:
      config: Debug
    archive:
      config: Release
