name: BizarreCRM
options:
  bundleIdPrefix: com.bizarrecrm
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configs/Debug.xcconfig
  Release: Configs/Release.xcconfig

packages:
  Core:          { path: Packages/Core }
  DesignSystem:  { path: Packages/DesignSystem }
  Networking:    { path: Packages/Networking }
  Persistence:   { path: Packages/Persistence }
  Auth:          { path: Packages/Auth }
  Sync:          { path: Packages/Sync }
  Hardware:      { path: Packages/Hardware }
  Dashboard:     { path: Packages/Dashboard }
  Tickets:       { path: Packages/Tickets }
  Customers:     { path: Packages/Customers }
  Inventory:     { path: Packages/Inventory }
  Invoices:      { path: Packages/Invoices }
  Estimates:     { path: Packages/Estimates }
  Leads:         { path: Packages/Leads }
  Appointments:  { path: Packages/Appointments }
  Expenses:      { path: Packages/Expenses }
  Pos:           { path: Packages/Pos }
  Communications: { path: Packages/Communications }
  Reports:       { path: Packages/Reports }
  Settings:      { path: Packages/Settings }
  Notifications: { path: Packages/Notifications }
  Employees:     { path: Packages/Employees }
  Camera:        { path: Packages/Camera }
  Search:        { path: Packages/Search }
  RepairPricing: { path: Packages/RepairPricing }
  Voice:         { path: Packages/Voice }
  Loyalty:       { path: Packages/Loyalty }
  Timeclock:     { path: Packages/Timeclock }
  CommandPalette: { path: Packages/CommandPalette }
  AuditLogs:     { path: Packages/AuditLogs }
  Marketing:     { path: Packages/Marketing }
  Setup:         { path: Packages/Setup }
  DataImport:    { path: Packages/DataImport }
  DataExport:    { path: Packages/DataExport }
  KioskMode:     { path: Packages/KioskMode }
  RolesEditor:   { path: Packages/RolesEditor }

targets:
  BizarreCRM:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: App/Resources
        excludes:
          # Info.plist is referenced via INFOPLIST_FILE below, not a bundle resource.
          - Info.plist
          # Entitlements isn't a bundle resource either.
          - BizarreCRM.entitlements
      - path: App/Assets.xcassets
    # NOTE: no `info:` block here on purpose — any `info:` makes xcodegen
    # regenerate the plist with defaults on every run, clobbering our script's
    # output. We point at the file via INFOPLIST_FILE in settings below and let
    # scripts/write-info-plist.sh be the sole writer. Use `bash scripts/gen.sh`
    # to regenerate the project.
    entitlements:
      path: App/Resources/BizarreCRM.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bizarrecrm
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
    dependencies:
      - package: Core
        product: Core
      - package: DesignSystem
        product: DesignSystem
      - package: Networking
        product: Networking
      - package: Persistence
        product: Persistence
      - package: Auth
        product: Auth
      - package: Sync
        product: Sync
      - package: Hardware
        product: Hardware
      - package: Dashboard
        product: Dashboard
      - package: Tickets
        product: Tickets
      - package: Customers
        product: Customers
      - package: Inventory
        product: Inventory
      - package: Invoices
        product: Invoices
      - package: Estimates
        product: Estimates
      - package: Leads
        product: Leads
      - package: Appointments
        product: Appointments
      - package: Expenses
        product: Expenses
      - package: Pos
        product: Pos
      - package: Communications
        product: Communications
      - package: Reports
        product: Reports
      - package: Settings
        product: Settings
      - package: Notifications
        product: Notifications
      - package: Employees
        product: Employees
      - package: Camera
        product: Camera
      - package: Search
        product: Search
      - package: RepairPricing
        product: RepairPricing
      - package: Voice
        product: Voice
      - package: Loyalty
        product: Loyalty
      - package: CommandPalette
        product: CommandPalette
      - package: AuditLogs
        product: AuditLogs
      - package: Marketing
        product: Marketing
      - package: Setup
        product: Setup
      - package: DataImport
        product: DataImport
      - package: DataExport
        product: DataExport
      - package: KioskMode
        product: KioskMode
      - package: RolesEditor
        product: RolesEditor

  BizarreCRMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bizarrecrm.tests
    dependencies:
      - target: BizarreCRM

  BizarreCRMUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/Performance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bizarrecrm.uitests
    dependencies:
      - target: BizarreCRM

schemes:
  BizarreCRM:
    build:
      targets:
        BizarreCRM: all
    test:
      targets:
        - BizarreCRMTests
        - BizarreCRMUITests
    run:
      config: Debug
    archive:
      config: Release
