# SwiftLint config for iOS BizarreCRM app.
# Enforces the sovereignty + Phase-0 rules from ios/ActionPlan.md §1/§32/§80
# plus agent-ownership.md "Independence rules".
#
# To install locally:  brew install swiftlint
# CI runs `swiftlint --config ios/.swiftlint.yml --strict`.

included:
  - Packages
  - App

excluded:
  - Packages/**/Tests
  - Tests
  - .build
  - DerivedData

disabled_rules:
  - trailing_whitespace        # auto-handled by formatter
  - line_length                # deliberately flexible for long SwiftUI view code
  - todo                       # TODO comments are OK — tracked separately
  - identifier_name            # SwiftUI closures / single-letter geom is fine

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - redundant_nil_coalescing
  - unneeded_parentheses_in_closure_argument

custom_rules:

  # §32 data-sovereignty: ban every third-party analytics / crash / AI SDK import.
  banned_sdks:
    name: "Banned SDK import (sovereignty violation)"
    regex: '^import\s+(Sentry|FirebaseCore|FirebaseCrashlytics|FirebaseAnalytics|Mixpanel|Amplitude|Bugsnag|Crashlytics|Datadog|NewRelic|FullStory|Segment|OpenAI|Anthropic|GoogleGenerativeAI|HuggingFace|Replicate|Cohere|LangChain|LangGraph|Langfuse)\b'
    message: "Third-party SDK import detected. See §32 — single egress = APIClient.baseURL. Do not add this dependency."
    severity: error

  # §1 data-layer rule: only `Core/Networking/` may instantiate URLSession.
  # Everything else goes through APIClient.
  raw_urlsession_outside_networking:
    name: "Raw URLSession outside Networking"
    regex: 'URLSession\s*\(configuration:'
    match_kinds: [identifier]
    message: "Instantiating URLSession is restricted to `Packages/Networking/`. Call APIClient instead."
    severity: error
    included:
      - Packages/App
      - Packages/Appointments
      - Packages/Auth
      - Packages/Camera
      - Packages/Communications
      - Packages/Customers
      - Packages/Dashboard
      - Packages/DesignSystem
      - Packages/Employees
      - Packages/Estimates
      - Packages/Expenses
      - Packages/Hardware
      - Packages/Inventory
      - Packages/Invoices
      - Packages/Leads
      - Packages/Notifications
      - Packages/Persistence
      - Packages/Pos
      - Packages/Reports
      - Packages/Search
      - Packages/Settings
      - Packages/Sync
      - Packages/Tickets

  # §80 token discipline: no raw hex colors in views.
  raw_hex_color:
    name: "Raw hex Color literal"
    regex: 'Color\s*\(\s*(?:red|hex):'
    message: "Use tokens from `DesignTokens` / `BrandColors`. No inline hex (§80)."
    severity: warning

  # §80: no inline `RoundedRectangle(cornerRadius: 12)` — use `DesignTokens.Radius.md`.
  raw_corner_radius:
    name: "Raw corner radius literal"
    regex: 'RoundedRectangle\s*\(\s*cornerRadius:\s*\d'
    message: "Use DesignTokens.Radius.* (§80). Raw radii drift from brand."
    severity: warning

  # §2.13 / §28.7: `os_log` / `Logger` should redact dynamic privacy-sensitive
  # fields with `privacy: .private`. Flag missing privacy annotations on
  # dynamic interpolations.
  #
  # This is a best-effort heuristic — if the interpolation is definitely a
  # string or user-derived, annotate. False positives are OK; silence them
  # per-line with `// swiftlint:disable:next`.
  logger_missing_privacy:
    name: "Logger interpolation missing privacy annotation"
    regex: 'Logger[^{]*\{[^}]*\\\([^,)]+\)'
    message: "Add `privacy: .private` (PII) or `.public` (IDs/enums) to Logger interpolations (§28.7 / §32.6)."
    severity: warning

  # §31 / §26.7: `onTapGesture` without `accessibilityLabel` on ad-hoc views
  # creates invisible-to-VoiceOver hotspots. Prefer `Button`.
  bare_on_tap_gesture:
    name: "Bare .onTapGesture without a11y wrapper"
    regex: '\.onTapGesture\s*\{'
    message: "Wrap in `Button` or add `.accessibilityAddTraits(.isButton)` + `.accessibilityLabel` (§26 + §31)."
    severity: warning
